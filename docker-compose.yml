      AURA_TTS_PREFACE_MIN_DEVICE_BYTES: ${AURA_TTS_PREFACE_MIN_DEVICE_BYTES:-8192}
      AURA_TTS_PREFACE_TEXT: ${AURA_TTS_PREFACE_TEXT:-嗯。}
      AURA_BRIDGE_STREAM_ENABLED: ${AURA_BRIDGE_STREAM_ENABLED:-1}
      AURA_BRIDGE_STREAM_MIN_CHARS: ${AURA_BRIDGE_STREAM_MIN_CHARS:-4}
      AURA_BRIDGE_STREAM_FIRST_SEGMENT_CHARS: ${AURA_BRIDGE_STREAM_FIRST_SEGMENT_CHARS:-6}
      AURA_BRIDGE_STREAM_WS_TTS_CHUNK_CHARS: ${AURA_BRIDGE_STREAM_WS_TTS_CHUNK_CHARS:-8}
      AURA_BRIDGE_STREAM_DEFER_LOCAL_PREFACE_CHARS: ${AURA_BRIDGE_STREAM_DEFER_LOCAL_PREFACE_CHARS:-4}
      AURA_BRIDGE_SPECULATIVE_ENABLED: ${AURA_BRIDGE_SPECULATIVE_ENABLED:-1}
      AURA_BRIDGE_SPECULATIVE_REUSE_ENABLED: ${AURA_BRIDGE_SPECULATIVE_REUSE_ENABLED:-1}
      AURA_BRIDGE_SPECULATIVE_MIN_CHARS: ${AURA_BRIDGE_SPECULATIVE_MIN_CHARS:-10}
