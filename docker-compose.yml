services:
  aura-lily:
    build:
      context: .
      args:
        HERMES_AGENT_VERSION: ${HERMES_AGENT_VERSION:-0.14.0}
        HERMES_AGENT_SOURCE: ${HERMES_AGENT_SOURCE:-}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.org/simple}
    image: aura-lily:local
    environment:
      HERMES_HOME: ${HERMES_HOME:-/home/aura/.hermes}
      # 容器时区必须跟用户本地一致：今日计划/作息按 datetime 本地时间生成，
      # UTC 容器会让整份日程偏移 8 小时（“洗漱”排到 15:21 这类问题）。
      TZ: ${TZ:-Asia/Shanghai}
      # Hermes v0.14 只认环境变量里的 provider key，config.yaml 的 api_key 不再生效。
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      # Kimi Coding Plan（kimi-for-coding，Anthropic 协议）
      KIMI_API_KEY: ${KIMI_API_KEY:-}
      AURA_COMPANION_HOME: ${AURA_COMPANION_HOME:-/data/aura-companion}
      AURA_PERSONA_HOME: ${AURA_PERSONA_HOME:-/data/aura-persona}
      AURA_PERSONA_ENABLED: ${AURA_PERSONA_ENABLED:-0}
      AURA_LILY_ADMIN_USER: ${AURA_LILY_ADMIN_USER:-admin}
      AURA_LILY_ADMIN_PASSWORD: ${AURA_LILY_ADMIN_PASSWORD:-}
      AURA_LILY_ADMIN_TOKEN: ${AURA_LILY_ADMIN_TOKEN:-}
      AURA_PERSONA_ADMIN_TOKEN: ${AURA_PERSONA_ADMIN_TOKEN:-}
      AURA_LILY_HERMES_CONFIG_PATH: ${AURA_LILY_HERMES_CONFIG_PATH:-/data/aura-persona/config/hermes_runtime.json}
      AURA_LILY_AURA_RUNTIME_CONFIG_PATH: ${AURA_LILY_AURA_RUNTIME_CONFIG_PATH:-/data/aura-persona/config/aura_runtime.json}
      AURA_LILY_HOME_CITY: ${AURA_LILY_HOME_CITY:-}
      AURA_USER_HOME_CITY: ${AURA_USER_HOME_CITY:-}
      AURA_USER_TIMEZONE: ${AURA_USER_TIMEZONE:-}
      AURA_USER_LATITUDE: ${AURA_USER_LATITUDE:-}
      AURA_USER_LONGITUDE: ${AURA_USER_LONGITUDE:-}
      AURA_USER_LOCATION_MODE: ${AURA_USER_LOCATION_MODE:-device_ip}
      AURA_USER_GEO_PROVIDER: ${AURA_USER_GEO_PROVIDER:-ipapi}
      AURA_USER_GEO_TIMEOUT_SECONDS: ${AURA_USER_GEO_TIMEOUT_SECONDS:-2.5}
      AURA_MODEL_MODE: ${AURA_MODEL_MODE:-hermes_main}
      AURA_MODEL_PROVIDER: ${AURA_MODEL_PROVIDER:-}
      AURA_MODEL_MODEL: ${AURA_MODEL_MODEL:-}
      AURA_MODEL_BASE_URL: ${AURA_MODEL_BASE_URL:-}
      AURA_MODEL_API_KEY: ${AURA_MODEL_API_KEY:-}
      AURA_MODEL_TIMEOUT_SECONDS: ${AURA_MODEL_TIMEOUT_SECONDS:-90}
      AURA_MODEL_MAX_TOKENS: ${AURA_MODEL_MAX_TOKENS:-96}
      AURA_MODEL_TEMPERATURE: ${AURA_MODEL_TEMPERATURE:-0.4}
      AURA_MODEL_REASONING_EFFORT: ${AURA_MODEL_REASONING_EFFORT:-none}
      AURA_DIRECT_LLM_HTTP_KEEPALIVE_ENABLED: ${AURA_DIRECT_LLM_HTTP_KEEPALIVE_ENABLED:-1}
      AURA_DIRECT_LLM_HTTP_KEEPALIVE_RETRY_ONCE: ${AURA_DIRECT_LLM_HTTP_KEEPALIVE_RETRY_ONCE:-1}
      AURA_DIRECT_LLM_HTTP_WARM_ENABLED: ${AURA_DIRECT_LLM_HTTP_WARM_ENABLED:-1}
      AURA_FAST_REPLY_ENABLED: ${AURA_FAST_REPLY_ENABLED:-1}
