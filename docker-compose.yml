      AURA_BRIDGE_SPECULATIVE_MAX_CHARS: ${AURA_BRIDGE_SPECULATIVE_MAX_CHARS:-160}
      AURA_BRIDGE_SPECULATIVE_MIN_PREFIX_RATIO: ${AURA_BRIDGE_SPECULATIVE_MIN_PREFIX_RATIO:-0.9}
      AURA_SERVER_VAD_ENABLED: ${AURA_SERVER_VAD_ENABLED:-1}
      AURA_SERVER_VAD_SPEECH_RMS: ${AURA_SERVER_VAD_SPEECH_RMS:-280}
      AURA_SERVER_VAD_SILENCE_RMS: ${AURA_SERVER_VAD_SILENCE_RMS:-180}
      AURA_SERVER_VAD_MIN_SPEECH_MS: ${AURA_SERVER_VAD_MIN_SPEECH_MS:-240}
      AURA_SERVER_VAD_SILENCE_MS: ${AURA_SERVER_VAD_SILENCE_MS:-900}
      AURA_REALTIME_LOCAL_VAD_SILENCE_MS: ${AURA_REALTIME_LOCAL_VAD_SILENCE_MS:-600}
      AURA_STREAMING_ASR_LOCAL_VAD_SILENCE_MS: ${AURA_STREAMING_ASR_LOCAL_VAD_SILENCE_MS:-360}
      AURA_SERVER_VAD_MIN_AUDIO_MS: ${AURA_SERVER_VAD_MIN_AUDIO_MS:-700}
      AURA_ASR_ENABLED: ${AURA_ASR_ENABLED:-1}
      AURA_ASR_MODE: ${AURA_ASR_MODE:-local}
      AURA_ASR_PROVIDER: ${AURA_ASR_PROVIDER:-local}
      AURA_ASR_MODEL: ${AURA_ASR_MODEL:-whisper-large-v3}
      AURA_ASR_BASE_URL: ${AURA_ASR_BASE_URL:-}
      AURA_ASR_API_KEY: ${AURA_ASR_API_KEY:-}
      AURA_ASR_LANGUAGE: ${AURA_ASR_LANGUAGE:-zh}
      AURA_ASR_TIMEOUT_SECONDS: ${AURA_ASR_TIMEOUT_SECONDS:-30}
      AURA_ASR_STEPFUN_WS_ENABLED: ${AURA_ASR_STEPFUN_WS_ENABLED:-1}
      AURA_ASR_STEPFUN_WS_SERVER_VAD: ${AURA_ASR_STEPFUN_WS_SERVER_VAD:-1}
      AURA_ASR_STEPFUN_WS_SILENCE_MS: ${AURA_ASR_STEPFUN_WS_SILENCE_MS:-360}
