      AURA_TTS_BASE_URL: ${AURA_TTS_BASE_URL:-}
      AURA_TTS_API_KEY: ${AURA_TTS_API_KEY:-}
      AURA_TTS_FORMAT: ${AURA_TTS_FORMAT:-pcm}
      AURA_TTS_SAMPLE_RATE: ${AURA_TTS_SAMPLE_RATE:-24000}
      AURA_TTS_TIMEOUT_SECONDS: ${AURA_TTS_TIMEOUT_SECONDS:-15}
      AURA_TTS_WS_CHUNK_BYTES: ${AURA_TTS_WS_CHUNK_BYTES:-2048}
      AURA_TTS_AUDIO_SEND_PACING_ENABLED: ${AURA_TTS_AUDIO_SEND_PACING_ENABLED:-1}
      AURA_TTS_AUDIO_SEND_PACING_RATE: ${AURA_TTS_AUDIO_SEND_PACING_RATE:-1.6}
