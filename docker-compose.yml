      AURA_ASR_STEPFUN_WS_COMMIT_WAIT_MS: ${AURA_ASR_STEPFUN_WS_COMMIT_WAIT_MS:-1200}
      AURA_ASR_STEPFUN_WS_FINISH_QUEUE_TIMEOUT_MS: ${AURA_ASR_STEPFUN_WS_FINISH_QUEUE_TIMEOUT_MS:-1000}
      AURA_ASR_STEPFUN_WS_QUEUE_FRAMES: ${AURA_ASR_STEPFUN_WS_QUEUE_FRAMES:-96}
      AURA_ASR_STEPFUN_WS_STOP_SILENCE_MS: ${AURA_ASR_STEPFUN_WS_STOP_SILENCE_MS:-260}
