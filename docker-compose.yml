      AURA_ASR_STEPFUN_WS_EARLY_TURN_ALLOW_PARTIAL: ${AURA_ASR_STEPFUN_WS_EARLY_TURN_ALLOW_PARTIAL:-0}
      AURA_ASR_STEPFUN_WS_USE_PARTIAL_AS_FINAL: ${AURA_ASR_STEPFUN_WS_USE_PARTIAL_AS_FINAL:-0}
      AURA_ASR_STEPFUN_WS_EARLY_TURN_MIN_CHARS: ${AURA_ASR_STEPFUN_WS_EARLY_TURN_MIN_CHARS:-4}
      AURA_ASR_STEPFUN_WS_EARLY_TURN_MIN_AUDIO_MS: ${AURA_ASR_STEPFUN_WS_EARLY_TURN_MIN_AUDIO_MS:-700}
      AURA_STREAMING_ASR_PREFETCH_ENABLED: ${AURA_STREAMING_ASR_PREFETCH_ENABLED:-1}
      AURA_STREAMING_ASR_PREFETCH_MIN_CHARS: ${AURA_STREAMING_ASR_PREFETCH_MIN_CHARS:-5}
      AURA_STREAMING_ASR_PREFETCH_WAIT_MS: ${AURA_STREAMING_ASR_PREFETCH_WAIT_MS:-150}
      AURA_STREAMING_ASR_DETERMINISTIC_PARTIAL_TURN_ENABLED: ${AURA_STREAMING_ASR_DETERMINISTIC_PARTIAL_TURN_ENABLED:-0}
      AURA_STREAMING_ASR_DETERMINISTIC_PARTIAL_MIN_CHARS: ${AURA_STREAMING_ASR_DETERMINISTIC_PARTIAL_MIN_CHARS:-7}
      AURA_STREAMING_ASR_DETERMINISTIC_PARTIAL_MIN_AUDIO_MS: ${AURA_STREAMING_ASR_DETERMINISTIC_PARTIAL_MIN_AUDIO_MS:-900}
      AURA_STREAMING_ASR_DETERMINISTIC_PARTIAL_EARLY_INTENTS: ${AURA_STREAMING_ASR_DETERMINISTIC_PARTIAL_EARLY_INTENTS:-weather,time,activity_or_location,local_quality}
      AURA_STREAMING_ASR_LOCAL_QUALITY_MIN_AUDIO_MS: ${AURA_STREAMING_ASR_LOCAL_QUALITY_MIN_AUDIO_MS:-900}
      AURA_STREAMING_ASR_STABLE_PARTIAL_TURN_ENABLED: ${AURA_STREAMING_ASR_STABLE_PARTIAL_TURN_ENABLED:-1}
      AURA_STREAMING_ASR_STABLE_PARTIAL_EARLY_TURN_ENABLED: ${AURA_STREAMING_ASR_STABLE_PARTIAL_EARLY_TURN_ENABLED:-0}
      AURA_STREAMING_ASR_STABLE_PARTIAL_MIN_CHARS: ${AURA_STREAMING_ASR_STABLE_PARTIAL_MIN_CHARS:-6}
      AURA_STREAMING_ASR_STABLE_PARTIAL_MIN_AUDIO_MS: ${AURA_STREAMING_ASR_STABLE_PARTIAL_MIN_AUDIO_MS:-700}
      AURA_RECORDING_NO_AUDIO_TIMEOUT_SECONDS: ${AURA_RECORDING_NO_AUDIO_TIMEOUT_SECONDS:-2.5}
      AURA_RECORDING_MAX_SECONDS: ${AURA_RECORDING_MAX_SECONDS:-8}
      AURA_ASR_LOW_CONFIDENCE_MAX_CHARS: ${AURA_ASR_LOW_CONFIDENCE_MAX_CHARS:-2}
      AURA_GATEWAY_LOG_TRANSCRIPT_PREVIEW: ${AURA_GATEWAY_LOG_TRANSCRIPT_PREVIEW:-1}
      HERMES_MODEL_OPTIONS: ${HERMES_MODEL_OPTIONS:-}
    command:
      - python
      - -m
      - integrations.hermes_lily_cli.server
      - --host
      - 0.0.0.0
      - --port
      - "8765"
      - --provider
      - ${HERMES_PROVIDER:-}
      - --model
      - ${HERMES_MODEL:-}
      - --timeout
      - ${HERMES_TIMEOUT:-180}
      - --toolsets
      - ${HERMES_TOOLSETS:-web,terminal,file,code_execution,skills,memory}
      - --skills
      - ${HERMES_SKILLS:-}
      - --hermes-home
      - ${HERMES_HOME:-/home/aura/.hermes}
      - --hermes-command
      - ${HERMES_COMMAND:-hermes}
      - --max-concurrency
      - ${HERMES_MAX_CONCURRENCY:-1}
      - --queue-timeout
      - ${HERMES_QUEUE_TIMEOUT:-30}
    ports:
      - "${AURA_LILY_HTTP_PORT:-8765}:8765"
    volumes:
      - ${HERMES_HOME_HOST:-./.docker/hermes-home}:/home/aura/.hermes
      - ${AURA_COMPANION_HOME_HOST:-./.docker/aura-companion}:/data/aura-companion
      - ${AURA_PERSONA_HOME_HOST:-./.docker/aura-persona}:/data/aura-persona
      - ${AURA_LILY_WORKSPACE_HOST:-./.docker/workspace}:/workspace
      - ${AURA_LILY_SKILLS_HOST:-./.docker/skills}:/skills
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import json,urllib.request; data=json.load(urllib.request.urlopen('http://127.0.0.1:8765/health', timeout=3)); raise SystemExit(0 if data.get('ok') else 1)"
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 20s

