      AURA_WEATHER_LATITUDE: ${AURA_WEATHER_LATITUDE:-}
      AURA_WEATHER_LONGITUDE: ${AURA_WEATHER_LONGITUDE:-}
      AURA_TTS_ENABLED: ${AURA_TTS_ENABLED:-0}
      AURA_TTS_PROVIDER: ${AURA_TTS_PROVIDER:-none}
      AURA_TTS_MODEL: ${AURA_TTS_MODEL:-}
