      AURA_TTS_PREFETCH_CONCURRENCY: ${AURA_TTS_PREFETCH_CONCURRENCY:-2}
      AURA_TTS_STEPFUN_WS_ENABLED: ${AURA_TTS_STEPFUN_WS_ENABLED:-1}
      AURA_TTS_STEPFUN_WS_FALLBACK_HTTP: ${AURA_TTS_STEPFUN_WS_FALLBACK_HTTP:-1}
      AURA_TTS_STEPFUN_WS_WARM_ENABLED: ${AURA_TTS_STEPFUN_WS_WARM_ENABLED:-1}
      AURA_TTS_STEPFUN_WS_SAMPLE_RATE: ${AURA_TTS_STEPFUN_WS_SAMPLE_RATE:-16000}
      AURA_TTS_STEPFUN_WS_OPEN_TIMEOUT_SECONDS: ${AURA_TTS_STEPFUN_WS_OPEN_TIMEOUT_SECONDS:-2}
      AURA_TTS_STEPFUN_WS_MAX_SESSIONS: ${AURA_TTS_STEPFUN_WS_MAX_SESSIONS:-2}
      AURA_TTS_STEPFUN_WS_ACQUIRE_TIMEOUT_SECONDS: ${AURA_TTS_STEPFUN_WS_ACQUIRE_TIMEOUT_SECONDS:-0.8}
      AURA_TTS_STEPFUN_WS_WARM_ACQUIRE_TIMEOUT_SECONDS: ${AURA_TTS_STEPFUN_WS_WARM_ACQUIRE_TIMEOUT_SECONDS:-0.05}
      AURA_TTS_STEPFUN_WS_429_COOLDOWN_SECONDS: ${AURA_TTS_STEPFUN_WS_429_COOLDOWN_SECONDS:-20}
      AURA_TTS_STEPFUN_WS_WAIT_FIRST_AUDIO: ${AURA_TTS_STEPFUN_WS_WAIT_FIRST_AUDIO:-0}
      AURA_TTS_STEPFUN_WS_FIRST_AUDIO_WAIT_MS: ${AURA_TTS_STEPFUN_WS_FIRST_AUDIO_WAIT_MS:-1200}
      AURA_TTS_STEPFUN_WS_FIRST_SEGMENT_READY_WAIT_MS: ${AURA_TTS_STEPFUN_WS_FIRST_SEGMENT_READY_WAIT_MS:-300}
      AURA_TTS_STEPFUN_WS_FIRST_SEGMENT_HTTP_POLICY: ${AURA_TTS_STEPFUN_WS_FIRST_SEGMENT_HTTP_POLICY:-auto}
      AURA_TTS_STEPFUN_WS_FLUSH_AFTER_DELTA: ${AURA_TTS_STEPFUN_WS_FLUSH_AFTER_DELTA:-1}
