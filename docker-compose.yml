      AURA_QUICK_ACK_REPLY_ENABLED: ${AURA_QUICK_ACK_REPLY_ENABLED:-1}
      AURA_CACHED_WEATHER_ENABLED: ${AURA_CACHED_WEATHER_ENABLED:-1}
      AURA_CACHED_WEATHER_CITY: ${AURA_CACHED_WEATHER_CITY:-}
      AURA_CACHED_WEATHER_TEMPERATURE: ${AURA_CACHED_WEATHER_TEMPERATURE:-}
